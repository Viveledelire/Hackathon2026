services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realworld
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d realworld']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:18
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/realworld?schema=public
      JWT_SECRET: dev-secret
      NODE_ENV: development
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
    command: ['sh', './docker/start-api.sh']

volumes:
  postgres_data:
  api_node_modules: